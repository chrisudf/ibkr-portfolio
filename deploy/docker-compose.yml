services:
  app:
    build: ..
    restart: unless-stopped
    # Share credentials with scripts/ibkr_sync.sh so the on-demand /api/refresh
    # button uses the same ACCOUNTS/BASIC_AUTH/UPLOAD_URL config as cron.
    # sync.env is gitignored; we mount the host file via env_file so secrets
    # never bake into the image.
    env_file:
      - ../scripts/sync.env
    volumes:
      - app_data:/app/uploads
    expose:
      - "8000"
    networks:
      - web

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    depends_on:
      - app

volumes:
  app_data:
  caddy_data:
  caddy_config:

networks:
  web:
